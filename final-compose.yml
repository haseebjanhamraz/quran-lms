name: quran-lms
services:
  egress:
    cap_add:
      - SYS_ADMIN
    container_name: quran-lms-egress
    depends_on:
      redis:
        condition: service_healthy
        required: true
    environment:
      EGRESS_CONFIG_FILE: /etc/egress/config.yaml
    extra_hosts:
      - host.docker.internal=host-gateway
    image: livekit/egress:latest
    networks:
      default: null
    restart: always
    volumes:
      - type: bind
        source: /mnt/backup4t/quran-lms/egress.yaml
        target: /etc/egress/config.yaml
        bind: {}
      - type: volume
        source: recordings_data
        target: /recordings
        volume: {}
  nestjs:
    build:
      context: /mnt/backup4t/quran-lms/apps/backend
      dockerfile: Dockerfile
    container_name: quran-lms-nestjs
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
      vosk:
        condition: service_started
        required: true
    environment:
      CORS_ORIGIN: https://quran-lms.kpcybers.com
      DATABASE_URL: postgresql://postgres:secure_production_db_password_change_me@postgres:5432/quran_lms?schema=public
      GEMINI_API_KEY: your_gemini_api_key_here
      GOOGLE_DRIVE_CLIENT_ID: ""
      GOOGLE_DRIVE_CLIENT_SECRET: ""
      GOOGLE_DRIVE_REDIRECT_URI: https://developers.google.com/oauthplayground
      GOOGLE_DRIVE_REFRESH_TOKEN: ""
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      JWT_REFRESH_SECRET: e5c36ab53ef913efb2ed90de8e796527e7d3d3e2f186e177852f7a10e4a3c725
      JWT_SECRET: 80ce788128d4cad1aa286fa8c06de9f203306fd628ccbe4a357d0af698aa12b6
      LIVEKIT_API_KEY: 0cfbf337dbd87d8527cf47e57d1ecf693d03bef8fdd5b0d93c03dc66d0ff71b8
      LIVEKIT_API_SECRET: 86ce40cd70d1653a91c3cedaf5c52e12e935ce4b7549657116ee9e0f2f073470
      LIVEKIT_HOST: http://host.docker.internal:7880
      LIVEKIT_PUBLIC_URL: wss://livekit.kpcybers.com
      NODE_ENV: production
      PORT: "5000"
      RECORDINGS_DIR: /app/recordings
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VOSK_SERVER_URL: ws://vosk:2700
    extra_hosts:
      - host.docker.internal=host-gateway
    networks:
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 5000
        published: "5000"
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /mnt/backup4t/quran-lms/apps/backend/recordings
        target: /recordings
        bind: {}
      - type: volume
        source: recordings_data
        target: /app/recordings
        volume: {}
  nextjs:
    build:
      context: /mnt/backup4t/quran-lms/apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://quran-api.kpcybers.com/api/v1
        NEXT_PUBLIC_LIVEKIT_URL: wss://livekit.kpcybers.com
    container_name: quran-lms-nextjs
    depends_on:
      nestjs:
        condition: service_healthy
        required: true
    environment:
      NEXT_PUBLIC_API_URL: https://quran-api.kpcybers.com/api/v1
      NEXT_PUBLIC_LIVEKIT_URL: wss://livekit.kpcybers.com
      NODE_ENV: production
    networks:
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 3000
        published: "3030"
        protocol: tcp
    restart: always
  postgres:
    container_name: quran-lms-postgres
    environment:
      POSTGRES_DB: quran_lms
      POSTGRES_PASSWORD: secure_production_db_password_change_me
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 10s
    image: postgres:15-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 5432
        published: "5333"
        protocol: tcp
    restart: always
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    container_name: quran-lms-redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 5s
      interval: 10s
      retries: 5
    image: redis:7-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 6379
        published: "6300"
        protocol: tcp
    restart: always
    volumes:
      - type: volume
        source: redis_data
        target: /data
        volume: {}
  vosk:
    container_name: quran-lms-vosk
    image: alphacep/kaldi-en:latest
    networks:
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 2700
        published: "2700"
        protocol: tcp
    restart: always
networks:
  default:
    name: quran-lms_default
volumes:
  postgres_data:
    name: quran-lms_postgres_data
  recordings_data:
    name: quran-lms_recordings_data
  redis_data:
    name: quran-lms_redis_data
