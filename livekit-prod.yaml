# ==============================================================================
# LiveKit Server Production Configuration
# ==============================================================================
# Save this file on the host machine to configure the LiveKit media server.
# Start command: livekit-server --config livekit-prod.yaml

port: 7880

# API credentials for application authentication
keys:
  # CHANGE THESE to strong secret keys (e.g. generate using 'openssl rand -hex 16')
  # Must match the LIVEKIT_API_KEY and LIVEKIT_API_SECRET in your .env file
  livekit_prod_api_key_generate_me: livekit_prod_api_secret_generate_me

# Redis configuration for cluster coordination and state tracking
redis:
  address: localhost:6380
  db: 0

# WebRTC media configuration
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  enable_loopback_candidate: false

# TURN server configuration for firewall traversal
turn:
  enabled: true
  domain: livekit.kpcybers.com
  tls_port: 0
  udp_port: 3478

# Webhook configuration for session events (notifies backend NestJS app)
webhook:
  # Must match the API key defined in keys above
  api_key: livekit_prod_api_key_generate_me
  urls:
    - http://127.0.0.1:4001/api/v1/livekit/webhook

# Logging settings
logging:
  json: true
  level: info
