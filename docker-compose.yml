services:
  postgres:
    image: postgres:15-alpine
    container_name: quran-lms-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: quran_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quran-lms-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  egress:
    image: livekit/egress:latest
    container_name: quran-lms-egress
    restart: always
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress/config.yaml
    volumes:
      - ./egress.yaml:/etc/egress/config.yaml
      - ./apps/backend/recordings:/recordings
    cap_add:
      - SYS_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  nestjs:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: quran-lms-nestjs
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/quran_lms?schema=public
      JWT_SECRET: your-secret-jwt-key-change-in-prod
      JWT_REFRESH_SECRET: your-refresh-secret-jwt-key-change-in-prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_HOST: http://host.docker.internal:7880
      LIVEKIT_PUBLIC_URL: http://localhost:7880
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      RECORDINGS_DIR: /recordings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/backend/recordings:/recordings
      - ./apps/backend/model:/app/model
    depends_on:
      - postgres
      - redis

  nextjs:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: quran-lms-nextjs
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - nestjs

volumes:
  postgres_data:
  redis_data:
