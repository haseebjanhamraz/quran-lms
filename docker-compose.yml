version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quran-lms-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: quran_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quran-lms-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: quran-lms-livekit
    restart: always
    command: ["--dev", "--keys", "devkey: secret"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

volumes:
  postgres_data:
  redis_data:
