services:
  postgres:
    image: postgres:15-alpine
    container_name: quran-lms-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: quran_lms
    ports:
      - "${POSTGRES_PORT_BINDING:-5432:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quran-lms-redis
    restart: always
    ports:
      - "${REDIS_PORT_BINDING:-6379:6379}"
    volumes:
      - redis_data:/data

  egress:
    image: livekit/egress:latest
    container_name: quran-lms-egress
    restart: always
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress/config.yaml
      - EGRESS_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - EGRESS_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - EGRESS_WS_URL=${LIVEKIT_HOST:-ws://host.docker.internal:7880}
    volumes:
      - ./egress.yaml:/etc/egress/config.yaml
      - ./apps/backend/recordings:/recordings
    cap_add:
      - SYS_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  nestjs:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: quran-lms-nestjs
    restart: always
    ports:
      - "${NESTJS_PORT_BINDING:-4000:4000}"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgrespassword@postgres:5432/quran_lms?schema=public}
      PORT: ${PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-your-secret-jwt-key-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-jwt-key-change-in-prod}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_HOST: ${LIVEKIT_HOST:-http://host.docker.internal:7880}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      RECORDINGS_DIR: ${RECORDINGS_DIR:-/recordings}
      VOSK_SERVER_URL: ${VOSK_SERVER_URL:-ws://vosk:2700}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI:-}
      GOOGLE_DRIVE_REFRESH_TOKEN: ${GOOGLE_DRIVE_REFRESH_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/backend/recordings:/app/recordings
      - ./apps/backend/recordings:/recordings
    depends_on:
      - postgres
      - redis
      - vosk

  vosk:
    image: alphacep/kaldi-en:latest
    container_name: quran-lms-vosk
    restart: always
    ports:
      - "${VOSK_PORT_BINDING:-2700:2700}"

  nextjs:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
    container_name: quran-lms-nextjs
    restart: always
    ports:
      - "${NEXTJS_PORT_BINDING:-3030:3030}"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
    depends_on:
      - nestjs

volumes:
  postgres_data:
  redis_data:
