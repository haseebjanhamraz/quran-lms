# ==============================================================================
# Quran LMS Production Nginx Configuration
# ==============================================================================
# Location on Ubuntu Server: /etc/nginx/sites-available/quran-lms
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/quran-lms /etc/nginx/sites-enabled/
# Run 'nginx -t' to verify syntax, then 'systemctl reload nginx'

# Rate limiting zone: allows up to 10 requests per second with a burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    listen [::]:80;
    server_name quran-lms.kpcybers.com;

    # Certbot verification path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Configuration (Port 443)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quran-lms.kpcybers.com;

    # SSL Certificates (managed by Certbot + Cloudflare DNS Origin Certs)
    ssl_certificate /etc/letsencrypt/live/quran-lms.kpcybers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quran-lms.kpcybers.com/privkey.pem;

    # Secure SSL parameters (Mozilla Intermediate configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval' wss: ws:;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;

    # Maximum file upload size (needed for recordings and avatar uploads)
    client_max_body_size 100M;

    # 1. NestJS Backend API Proxy (Port 4001)
    location /api/ {
        # Apply rate limiting to API endpoints
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 2. Next.js Frontend Proxy (Port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable cache for static files/Next.js files if needed
        # (Usually Next.js handles caching internally, but this is a good fallback)
        proxy_buffering off;
    }
}
